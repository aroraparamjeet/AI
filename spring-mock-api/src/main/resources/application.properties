# LocalMock Spring Boot API - runs on 8081 (avoids conflict with app on 8080)
# Set your app's external API base URL to: http://localhost:8081

server.port=8081
spring.application.name=LocalMock-API

# Pretty-print JSON responses
spring.jackson.serialization.indent-output=true

# Show mock request logs in console
logging.level.com.localmock=DEBUG
logging.pattern.console=%d{HH:mm:ss} [MOCK] %-5level %logger{20} - %msg%n

# Cleaner startup output
spring.main.banner-mode=console
